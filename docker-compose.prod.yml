# 生产环境 — 单容器，前后端合并，含自动重启
# 快速启动：bash setup.sh --quick
# 手动启动：docker compose -f docker-compose.prod.yml up -d
#
# 可通过 .env 或环境变量自定义：
#   APP_PORT=80         # 对外端口（默认 3001）
#   PUBLIC_URL=https://yourdomain.com

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: history-loong:latest
    container_name: history-loong
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - history_data:/app/data
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FRONTEND_URL: "${PUBLIC_URL:-http://localhost:${APP_PORT:-3001}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  history_data:
    driver: local
